<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="-apple-system, 'Hiragino Sans', 'Yu Gothic', 'Meiryo', system-ui, sans-serif">
  <!-- ===== background ===== -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBFAF6"/>
      <stop offset="1" stop-color="#F1ECE1"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.1" fill="#1A202C" opacity="0.07"/>
    </pattern>
    <linearGradient id="mcpPipe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1E40AF"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1A202C" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- ===== title ===== -->
  <text x="600" y="92" font-size="60" font-weight="800" fill="#0F172A" text-anchor="middle" letter-spacing="-1">
    protopedia-mcp
  </text>
  <text x="600" y="138" font-size="22" font-weight="500" fill="#475569" text-anchor="middle">
    自然文で ProtoPedia 作品を検索する Claude 向け MCP サーバー
  </text>

  <!-- ===== left card: Claude prompt ===== -->
  <g filter="url(#shadow)">
    <rect x="60"  y="220" width="320" height="220" rx="20" fill="#FFFFFF" stroke="#FBBF24" stroke-width="2"/>
    <!-- Claude badge -->
    <rect x="80"  y="240" width="120" height="32" rx="16" fill="#FEF3C7"/>
    <circle cx="98" cy="256" r="6" fill="#D97706"/>
    <text x="112" y="261" font-size="14" font-weight="700" fill="#92400E">Claude</text>
    <!-- prompt -->
    <text x="80"  y="316" font-size="22" font-weight="600" fill="#0F172A">「ばんのさんが</text>
    <text x="80"  y="350" font-size="22" font-weight="600" fill="#0F172A"> AWS を使って</text>
    <text x="80"  y="384" font-size="22" font-weight="600" fill="#0F172A"> 完成させた作品、</text>
    <text x="80"  y="418" font-size="22" font-weight="600" fill="#0F172A"> 見せて」</text>
  </g>

  <!-- ===== middle: MCP pipe ===== -->
  <g transform="translate(420, 310)">
    <!-- pipe body -->
    <rect x="0" y="14" width="345" height="44" rx="22" fill="url(#mcpPipe)"/>
    <!-- arrow head -->
    <polygon points="340,8 380,36 340,64" fill="#2563EB"/>
    <text x="172" y="44" font-size="22" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="2">MCP</text>
    <!-- captions above/below -->
    <text x="190" y="-8" font-size="14" font-weight="600" fill="#475569" text-anchor="middle" letter-spacing="0.5">
      JSON-RPC over stdio
    </text>
    <text x="190" y="92" font-size="13" font-weight="500" fill="#64748B" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, monospace">
      Bearer token · v2 API
    </text>
  </g>

  <!-- ===== right card: ProtoPedia result ===== -->
  <g filter="url(#shadow)">
    <rect x="820" y="220" width="320" height="220" rx="20" fill="#FFFFFF" stroke="#10B981" stroke-width="2"/>
    <!-- header -->
    <rect x="840" y="240" width="148" height="32" rx="16" fill="#D1FAE5"/>
    <circle cx="858" cy="256" r="6" fill="#10B981"/>
    <text x="872" y="261" font-size="14" font-weight="700" fill="#065F46">ProtoPedia</text>
    <!-- mock card content -->
    <text x="840" y="316" font-size="22" font-weight="700" fill="#0F172A">○○な作品</text>
    <text x="840" y="346" font-size="14" fill="#475569">by ばんの@tomoki_banno</text>
    <!-- chip row -->
    <rect x="840" y="364" width="92"  height="26" rx="13" fill="#F1F5F9"/>
    <text x="886" y="382" font-size="13" font-weight="600" fill="#334155" text-anchor="middle">AWS</text>
    <rect x="940" y="364" width="112" height="26" rx="13" fill="#F1F5F9"/>
    <text x="996" y="382" font-size="13" font-weight="600" fill="#334155" text-anchor="middle">TypeScript</text>
    <!-- stats -->
    <text x="840" y="418" font-size="15" font-weight="600" fill="#10B981">
      <tspan>♥ 33</tspan>
      <tspan dx="14" fill="#475569">💬 8</tspan>
      <tspan dx="14" fill="#475569">👁 1.6k</tspan>
    </text>
  </g>

  <!-- ===== tools strip ===== -->
  <g transform="translate(0, 500)">
    <rect x="220" y="0" width="760" height="50" rx="25" fill="#0F172A"/>
    <text x="600" y="32" font-size="17" font-weight="600" fill="#E2E8F0" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, monospace" letter-spacing="0.5">
      search_prototypes  ·  get_prototype  ·  list_materials
    </text>
  </g>

  <!-- ===== footer URL ===== -->
  <text x="600" y="595" font-size="15" font-weight="500" fill="#64748B" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, monospace">
    github.com/qurihara/protopedia-mcp
  </text>
</svg>
